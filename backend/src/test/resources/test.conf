test {
    database {
        url = "jdbc:postgresql://localhost:5432/skautu_inventorius_test"
        url = ${?TEST_DB_URL}
        driver = "org.postgresql.Driver"
        user = "postgres"
        user = ${?TEST_DB_USER}
        password = ${TEST_DB_PASSWORD}
    }
    jwt {
        secret = ${TEST_JWT_SECRET}
        issuer = "lt.skautai.test"
        audience = "lt.skautai.test.app"
        realm = "test"
    }
    setup {
        bootstrapToken = "test-bootstrap-token"
    }
}
